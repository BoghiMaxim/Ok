<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contul Meu - MoldaStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css"/>
  <style>
    .account-page { max-width: 1100px; margin: 40px auto 80px; padding: 0 5%; display: grid; grid-template-columns: 280px 1fr; gap: 32px; align-items: start; }
    .account-sidebar { position: sticky; top: 88px; background: var(--white); border: 1px solid var(--line); border-radius: 24px; padding: 24px; }
    .account-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--accent-dark)); color: white; display: grid; place-items: center; font-size: 24px; font-weight: 700; margin: 0 auto 14px; font-family: var(--font-display); }
    .account-name { text-align: center; font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .account-email { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .account-nav { list-style: none; }
    .account-nav li { margin-bottom: 4px; }
    .account-nav a { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 14px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 14px; transition: 0.2s; }
    .account-nav a:hover { background: var(--bg); }
    .account-nav a.active { background: var(--accent-soft); color: var(--accent); }
    .account-nav .nav-icon { font-size: 16px; }
    .logout-btn { width: 100%; margin-top: 16px; padding: 11px; border: 1.5px solid var(--line); border-radius: 14px; background: transparent; color: var(--muted); font-weight: 600; font-size: 14px; cursor: pointer; font-family: var(--font-body); transition: 0.2s; }
    .logout-btn:hover { border-color: #e04040; color: #e04040; background: #fff5f5; }
    .account-content { }
    .account-section { background: var(--white); border: 1px solid var(--line); border-radius: 24px; padding: 28px; margin-bottom: 20px; display: none; }
    .account-section.active { display: block; }
    .account-section-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 22px; }
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--bg); border-radius: 18px; padding: 18px; text-align: center; }
    .stat-num { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .stat-lbl { color: var(--muted); font-size: 13px; }
    .order-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--bg); border-radius: 16px; margin-bottom: 10px; gap: 12px; flex-wrap: wrap; }
    .order-id { font-weight: 700; font-size: 14px; font-family: var(--font-display); }
    .order-date { color: var(--muted); font-size: 13px; }
    .order-status { padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .status-procesare { background: #fff7e0; color: #9a6800; }
    .status-livrat { background: #e8f5e2; color: #2f7d57; }
    .order-total { font-weight: 700; color: var(--accent); font-size: 15px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input { width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 14px; font-size: 14px; font-family: var(--font-body); background: var(--bg); outline: none; color: var(--text); transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--accent); background: var(--white); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-save { padding: 13px 28px; background: var(--accent); color: white; border: none; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--font-body); transition: 0.22s; }
    .btn-save:hover { background: var(--accent-dark); }
    .fav-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 14px; }
    .empty-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    @media(max-width:860px){ .account-page{grid-template-columns:1fr;} .account-sidebar{position:static;} .stats-row{grid-template-columns:1fr 1fr;} .fav-grid{grid-template-columns:1fr;} .form-row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div id="scroll-progress"></div>
<div class="toast" id="toast"><span class="toast-icon">✓</span><span id="toastMsg"></span></div>

<nav id="mainNav">
  <a class="nav-logo" href="index.html">Molda<span style="color:var(--accent)">Store</span></a>
  <ul class="nav-links">
    <li><a href="index.html#categories">Femei</a></li>
    <li><a href="index.html#categories">Barbati</a></li>
    <li><a href="index.html#products">Colectii</a></li>
  </ul>
  <div class="nav-actions">
    <button id="accountBtn" class="nav-icon-btn" style="font-size:13px;font-weight:600;width:auto;padding:0 14px;border-radius:999px;" onclick="window.location.href='cont.html'">👤</button>
    <button class="btn-cart-nav" onclick="window.location.href='index.html'">Cos <span class="cart-count" id="cartCount">0</span></button>
  </div>
</nav>

<div class="account-page">
  <div class="account-sidebar">
    <div class="account-avatar" id="sidebarAvatar">?</div>
    <div class="account-name" id="sidebarName">Contul meu</div>
    <div class="account-email" id="sidebarEmail"></div>
    <ul class="account-nav">
      <li><a href="#" class="active" onclick="showTab('dashboard',this)"><span class="nav-icon">🏠</span> Tablou de bord</a></li>
      <li><a href="#" onclick="showTab('orders',this)"><span class="nav-icon">📦</span> Comenzile mele</a></li>
      <li><a href="#" onclick="showTab('favorites',this)"><span class="nav-icon">❤️</span> Favorite</a></li>
      <li><a href="#" onclick="showTab('profile',this)"><span class="nav-icon">✏️</span> Editare profil</a></li>
      <li><a href="#" onclick="showTab('address',this)"><span class="nav-icon">📍</span> Adrese livrare</a></li>
    </ul>
    <button class="logout-btn" onclick="logout()">Deconectare</button>
  </div>

  <div class="account-content">
    <div class="account-section active" id="tab-dashboard">
      <div class="account-section-title">Bun venit inapoi!</div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="statOrders">0</div><div class="stat-lbl">Comenzi</div></div>
        <div class="stat-card"><div class="stat-num" id="statFavs">0</div><div class="stat-lbl">Favorite</div></div>
        <div class="stat-card"><div class="stat-num" id="statSpent">0</div><div class="stat-lbl">MDL cheltuiti</div></div>
      </div>
      <h3 style="font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:14px;">Ultima comanda</h3>
      <div id="lastOrderWidget"></div>
    </div>

    <div class="account-section" id="tab-orders">
      <div class="account-section-title">Comenzile mele</div>
      <div id="ordersList"></div>
    </div>

    <div class="account-section" id="tab-favorites">
      <div class="account-section-title">Produse favorite</div>
      <div class="fav-grid" id="favGrid"></div>
    </div>

    <div class="account-section" id="tab-profile">
      <div class="account-section-title">Editare profil</div>
      <div class="form-row">
        <div class="form-group"><label>Prenume</label><input id="editPrenume" type="text"/></div>
        <div class="form-group"><label>Nume</label><input id="editNume" type="text"/></div>
      </div>
      <div class="form-group"><label>Email</label><input id="editEmail" type="email"/></div>
      <div class="form-group"><label>Telefon</label><input id="editTelefon" type="tel"/></div>
      <div class="form-group"><label>Parola noua (optional)</label><input id="editParola" type="password" placeholder="Lasa gol daca nu vrei sa schimbi"/></div>
      <button class="btn-save" onclick="saveProfile()">Salveaza modificarile</button>
    </div>

    <div class="account-section" id="tab-address">
      <div class="account-section-title">Adrese de livrare</div>
      <div class="form-group"><label>Oras</label><input id="addrCity" type="text" placeholder="Chisinau"/></div>
      <div class="form-group"><label>Adresa completa</label><input id="addrStreet" type="text" placeholder="Str. Stefan cel Mare, 1, ap. 10"/></div>
      <div class="form-group"><label>Cod postal (optional)</label><input id="addrZip" type="text" placeholder="MD-2001"/></div>
      <button class="btn-save" onclick="saveAddress()">Salveaza adresa</button>
    </div>
  </div>
</div>

<script src="./js/script.js"></script>
<script>
let currentUser = null;
let allProducts = [];

function showTab(tab, el) {
  document.querySelectorAll('.account-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.account-nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(el) el.classList.add('active');
}

function logout() {
  if(confirm('Esti sigur ca vrei sa te deconectezi?')) {
    localStorage.removeItem('loggedUser');
    window.location.href = 'index.html';
  }
}

function saveProfile() {
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  user.prenume = document.getElementById('editPrenume').value;
  user.nume = document.getElementById('editNume').value;
  user.email = document.getElementById('editEmail').value;
  user.telefon = document.getElementById('editTelefon').value;
  const newPass = document.getElementById('editParola').value;
  if(newPass) user.parola = newPass;
  localStorage.setItem('loggedUser', JSON.stringify(user));
  const users = JSON.parse(localStorage.getItem('users')||'[]');
  const idx = users.findIndex(u=>u.email===user.email);
  if(idx>-1) { users[idx] = user; localStorage.setItem('users', JSON.stringify(users)); }
  showToast('Profil actualizat cu succes!');
  loadAccount();
}

function saveAddress() {
  const addr = { city: document.getElementById('addrCity').value, street: document.getElementById('addrStreet').value, zip: document.getElementById('addrZip').value };
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  user.address = addr;
  localStorage.setItem('loggedUser', JSON.stringify(user));
  showToast('Adresa salvata!');
}

function loadAccount() {
  currentUser = JSON.parse(localStorage.getItem('loggedUser'));
  if(!currentUser) { window.location.href = 'login.html'; return; }

  const initials = ((currentUser.prenume||'?')[0] + (currentUser.nume||'')[0]).toUpperCase();
  document.getElementById('sidebarAvatar').textContent = initials;
  document.getElementById('sidebarName').textContent = (currentUser.prenume||'') + ' ' + (currentUser.nume||'');
  document.getElementById('sidebarEmail').textContent = currentUser.email;

  document.getElementById('editPrenume').value = currentUser.prenume||'';
  document.getElementById('editNume').value = currentUser.nume||'';
  document.getElementById('editEmail').value = currentUser.email||'';
  document.getElementById('editTelefon').value = currentUser.telefon||'';
  if(currentUser.address) {
    document.getElementById('addrCity').value = currentUser.address.city||'';
    document.getElementById('addrStreet').value = currentUser.address.street||'';
    document.getElementById('addrZip').value = currentUser.address.zip||'';
  }

  const orders = JSON.parse(localStorage.getItem('orders')||'[]');
  const favs = JSON.parse(localStorage.getItem('favorites')||'[]');
  const totalSpent = orders.reduce((s,o)=>s+(o.total||0),0);

  document.getElementById('statOrders').textContent = orders.length;
  document.getElementById('statFavs').textContent = favs.length;
  document.getElementById('statSpent').textContent = totalSpent;

  if(orders.length) {
    const last = orders[orders.length-1];
    document.getElementById('lastOrderWidget').innerHTML = `
      <div class="order-row">
        <div><div class="order-id">#${last.id}</div><div class="order-date">${last.date}</div></div>
        <span class="order-status status-procesare">${last.status}</span>
        <div class="order-total">${last.total} MDL</div>
      </div>`;
  } else {
    document.getElementById('lastOrderWidget').innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">Nicio comanda inca</div><p>Exploreaza colectia noastra!</p></div>';
  }

  document.getElementById('ordersList').innerHTML = orders.length ? orders.slice().reverse().map(o=>`
    <div class="order-row">
      <div><div class="order-id">#${o.id}</div><div class="order-date">${o.date} · ${o.items?.length||0} produse</div></div>
      <span class="order-status ${o.status==='Livrat'?'status-livrat':'status-procesare'}">${o.status}</span>
      <div class="order-total">${o.total} MDL</div>
    </div>`).join('') :
    '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">Nicio comanda inca</div></div>';

  fetch('./produse.json').then(r=>r.json()).then(data=>{
    allProducts = data;
    const favProds = data.filter(p=>favs.includes(p.id));
    document.getElementById('favGrid').innerHTML = favProds.length ? favProds.map(p=>`
      <article class="product-card">
        <div class="product-image" style="height:200px;">
          <img src="${p.image}" class="prod-img" alt="${p.name}"/>
          <span class="product-badge">${p.badge}</span>
        </div>
        <div class="product-content">
          <div class="product-top"><h3 class="product-name">${p.name}</h3><div class="product-price">${p.price} MDL</div></div>
          <div class="product-actions">
            <button class="btn-buy" onclick="window.location.href='produs.html?id=${p.id}'">Vezi produs</button>
          </div>
        </div>
      </article>`).join('') :
      '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">❤️</div><div class="empty-title">Niciun favorit inca</div><p>Apasa inima de pe un produs pentru a-l salva.</p></div>';
  });
}

loadAccount();
updateNavForUser();
</script>
</body>
</html>
