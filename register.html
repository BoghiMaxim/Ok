<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Register - MoldaStore</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="form-box">
  <h1>Inregistrare</h1>

  <input type="text" id="nume" placeholder="Nume">
  <input type="text" id="prenume" placeholder="Prenume">
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="telefon" placeholder="Telefon">
  <input type="password" id="parola" placeholder="Parola">
  <input type="password" id="confirmareParola" placeholder="Confirmare parola">

  <button id="registerBtn">Inregistreaza-te</button>

  <p id="msg"></p>

  <a href="login.html">Ai cont? Login</a>
</div>

<script src="./js/script.js"></script>

</html>
