<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Checkout - MoldaStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css"/>
  <style>
    .checkout-page { max-width: 1100px; margin: 40px auto 80px; padding: 0 5%; display: grid; grid-template-columns: 1fr 420px; gap: 40px; align-items: start; }
    .checkout-form-section { background: var(--white); border: 1px solid var(--line); border-radius: 28px; padding: 32px; }
    .checkout-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 22px; display: flex; align-items: center; gap: 10px; }
    .checkout-step-num { width: 30px; height: 30px; background: var(--accent); color: white; border-radius: 50%; display: grid; place-items: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 14px; font-size: 14px; font-family: var(--font-body); background: var(--bg); outline: none; transition: border-color 0.2s; color: var(--text); }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); background: var(--white); }
    .payment-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .payment-option { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 1.5px solid var(--line); border-radius: 14px; cursor: pointer; transition: 0.2s; }
    .payment-option.selected { border-color: var(--accent); background: var(--accent-soft); }
    .payment-option input[type=radio] { accent-color: var(--accent); width: 16px; height: 16px; }
    .payment-label { font-weight: 600; font-size: 14px; }
    .payment-sub { font-size: 12px; color: var(--muted); }
    .payment-icon { font-size: 22px; }
    .order-summary { background: var(--white); border: 1px solid var(--line); border-radius: 28px; padding: 28px; position: sticky; top: 88px; }
    .order-summary-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .order-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .order-thumb { width: 60px; height: 60px; border-radius: 12px; background: var(--bg-2); object-fit: cover; flex-shrink: 0; }
    .order-thumb-grad { width: 60px; height: 60px; border-radius: 12px; flex-shrink: 0; }
    .order-item-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .order-item-meta { font-size: 12px; color: var(--muted); }
    .order-item-price { font-weight: 700; color: var(--accent); font-size: 14px; margin-left: auto; white-space: nowrap; }
    .order-totals { margin-top: 16px; }
    .order-line { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; }
    .order-line.total { font-weight: 700; font-size: 16px; border-top: 1.5px solid var(--line); margin-top: 8px; padding-top: 12px; }
    .order-line .free { color: var(--green); font-weight: 700; }
    .promo-row { display: flex; gap: 8px; margin: 14px 0; }
    .promo-input { flex: 1; border: 1.5px solid var(--line); border-radius: 12px; padding: 11px 14px; font-size: 14px; font-family: var(--font-body); outline: none; background: var(--bg); }
    .promo-input:focus { border-color: var(--accent); }
    .promo-apply { padding: 11px 16px; background: var(--text); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: var(--font-body); transition: 0.2s; }
    .promo-apply:hover { background: var(--accent); }
    .btn-place-order { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 999px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: var(--font-body); margin-top: 18px; transition: 0.22s; box-shadow: 0 8px 24px rgba(181,98,46,0.3); }
    .btn-place-order:hover { background: var(--accent-dark); transform: translateY(-2px); }
    .security-note { text-align: center; font-size: 12px; color: var(--muted); margin-top: 12px; }
    .step-divider { border: none; border-top: 1px solid var(--line); margin: 24px 0; }
    .success-overlay { display: none; position: fixed; inset: 0; background: rgba(15,10,5,0.6); backdrop-filter: blur(8px); z-index: 9000; justify-content: center; align-items: center; }
    .success-overlay.active { display: flex; }
    .success-box { background: var(--white); border-radius: 32px; padding: 48px 40px; text-align: center; max-width: 460px; width: 90%; box-shadow: var(--shadow-xl); animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
    .success-icon { font-size: 64px; margin-bottom: 20px; display: block; }
    .success-title { font-family: var(--font-display); font-size: 30px; font-weight: 700; margin-bottom: 10px; }
    .success-sub { color: var(--muted); font-size: 15px; line-height: 1.65; margin-bottom: 28px; }
    .success-order-num { background: var(--accent-soft); color: var(--accent-dark); border-radius: 12px; padding: 12px 20px; font-weight: 700; font-size: 16px; margin-bottom: 24px; display: inline-block; }
    @media(max-width:900px) { .checkout-page{grid-template-columns:1fr;} .order-summary{position:static;} .form-row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div id="scroll-progress"></div>
<div class="toast" id="toast"><span class="toast-icon">✓</span><span id="toastMsg"></span></div>

<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <span class="success-icon">🎉</span>
    <h2 class="success-title">Comanda plasata!</h2>
    <p class="success-sub">Multumim pentru comanda ta! Vei primi un email de confirmare in cateva minute.</p>
    <div class="success-order-num" id="orderNum">Comanda #MS-2026-0001</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:24px;">Livrare estimata: <strong>24-48h</strong></p>
    <button class="btn-primary" onclick="window.location.href='index.html'" style="border:none;cursor:pointer;font-family:var(--font-body)">Inapoi la magazin</button>
  </div>
</div>

<nav id="mainNav">
  <a class="nav-logo" href="index.html">Molda<span style="color:var(--accent)">Store</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Acasa</a></li>
  </ul>
  <div class="nav-actions">
    <button class="btn-cart-nav" onclick="window.location.href='index.html'">← Inapoi la cumparaturi</button>
  </div>
</nav>

<div class="checkout-page">
  <div>
    <div class="checkout-form-section">
      <div class="checkout-title"><span class="checkout-step-num">1</span> Date de livrare</div>
      <div class="form-row">
        <div class="form-group"><label>Prenume</label><input id="firstName" type="text" placeholder="Ion"/></div>
        <div class="form-group"><label>Nume</label><input id="lastName" type="text" placeholder="Popescu"/></div>
      </div>
      <div class="form-group"><label>Email</label><input id="email" type="email" placeholder="ion@example.md"/></div>
      <div class="form-group"><label>Telefon</label><input id="phone" type="tel" placeholder="+373 79 000 000"/></div>
      <div class="form-group"><label>Oras / Localitate</label>
        <select id="city">
          <option>Chisinau</option><option>Balti</option><option>Cahul</option>
          <option>Orhei</option><option>Soroca</option><option>Alta localitate</option>
        </select>
      </div>
      <div class="form-group"><label>Adresa</label><input id="address" type="text" placeholder="Str. Stefan cel Mare, 1, ap. 10"/></div>
      <div class="form-group"><label>Note (optional)</label><textarea id="notes" rows="2" placeholder="Informatii suplimentare pentru curier..."></textarea></div>

      <hr class="step-divider"/>
      <div class="checkout-title"><span class="checkout-step-num">2</span> Metoda de plata</div>
      <div class="payment-options">
        <label class="payment-option selected" onclick="selectPayment(this,'card')">
          <input type="radio" name="payment" value="card" checked/>
          <span class="payment-icon">💳</span>
          <div><div class="payment-label">Card bancar online</div><div class="payment-sub">Visa, Mastercard — securizat SSL</div></div>
        </label>
        <label class="payment-option" onclick="selectPayment(this,'cash')">
          <input type="radio" name="payment" value="cash"/>
          <span class="payment-icon">💵</span>
          <div><div class="payment-label">Numerar la livrare</div><div class="payment-sub">Platesti cand primesti coletul</div></div>
        </label>
        <label class="payment-option" onclick="selectPayment(this,'rate')">
          <input type="radio" name="payment" value="rate"/>
          <span class="payment-icon">📆</span>
          <div><div class="payment-label">Rate fara dobanda</div><div class="payment-sub">3, 6 sau 12 rate — Maib, Mobiasbanca</div></div>
        </label>
      </div>
      <div id="cardFields" style="display:block;">
        <div class="form-group"><label>Numar card</label><input type="text" placeholder="0000 0000 0000 0000" maxlength="19"/></div>
        <div class="form-row">
          <div class="form-group"><label>Expirare</label><input type="text" placeholder="MM/AA" maxlength="5"/></div>
          <div class="form-group"><label>CVV</label><input type="text" placeholder="***" maxlength="3"/></div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="order-summary">
      <div class="order-summary-title">Comanda ta</div>
      <div id="orderItems"></div>
      <div class="promo-row">
        <input class="promo-input" id="promoCode" type="text" placeholder="Cod promotional"/>
        <button class="promo-apply" onclick="applyPromo()">Aplica</button>
      </div>
      <div class="order-totals" id="orderTotals"></div>
      <button class="btn-place-order" onclick="placeOrder()">Plaseaza comanda →</button>
      <div class="security-note">🔒 Comanda ta este securizata SSL 256-bit</div>
    </div>
  </div>
</div>

<script src="./js/script.js"></script>
<script>
let selectedPayment = 'card';
let discount = 0;

function selectPayment(el, type) {
  selectedPayment = type;
  document.querySelectorAll('.payment-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('cardFields').style.display = type==='card' ? 'block' : 'none';
}

function renderOrderItems() {
  if(!cart.length) { document.getElementById('orderItems').innerHTML='<p style="color:var(--muted);text-align:center;padding:20px 0;">Cosul este gol</p>'; return; }
  document.getElementById('orderItems').innerHTML = cart.map(item=>`
    <div class="order-item">
      <div class="order-thumb-grad" style="background:${item.gradient}"></div>
      <div style="flex:1;">
        <div class="order-item-name">${item.name}</div>
        <div class="order-item-meta">${item.selectedSize||''} ${item.selectedColor||item.colors?.[0]||''}</div>
      </div>
      <div class="order-item-price">${item.price} MDL</div>
    </div>
  `).join('');

  const subtotal = cart.reduce((s,i)=>s+i.price, 0);
  const delivery = subtotal >= 500 ? 0 : 45;
  const discountAmt = Math.round(subtotal * discount);
  const total = subtotal - discountAmt + delivery;

  document.getElementById('orderTotals').innerHTML = `
    <div class="order-line"><span>Subtotal (${cart.length} produse)</span><span>${subtotal} MDL</span></div>
    ${discountAmt>0?`<div class="order-line"><span>Reducere cod promo</span><span style="color:var(--green)">-${discountAmt} MDL</span></div>`:''}
    <div class="order-line"><span>Livrare</span><span class="${delivery===0?'free':''}">${delivery===0?'Gratuita':delivery+' MDL'}</span></div>
    <div class="order-line total"><span>Total</span><span style="color:var(--accent)">${total} MDL</span></div>
  `;
}

function applyPromo() {
  const code = document.getElementById('promoCode').value.trim().toUpperCase();
  if(code === 'MOLDA10') { discount = 0.10; showToast('Cod aplicat: -10%!'); }
  else if(code === 'WELCOME') { discount = 0.15; showToast('Cod aplicat: -15%!'); }
  else { showToast('Cod promotional invalid'); return; }
  renderOrderItems();
}

function placeOrder() {
  const firstName = document.getElementById('firstName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const address = document.getElementById('address').value.trim();
  if(!firstName || !phone || !address) { showToast('Completeaza toate campurile obligatorii'); return; }
  if(!cart.length) { showToast('Cosul tau este gol'); return; }

  const orderNum = 'MS-2026-' + String(Math.floor(Math.random()*9000)+1000);
  document.getElementById('orderNum').textContent = 'Comanda #' + orderNum;

  const orders = JSON.parse(localStorage.getItem('orders')||'[]');
  orders.push({ id: orderNum, date: new Date().toLocaleDateString('ro-RO'), items: [...cart], total: cart.reduce((s,i)=>s+i.price,0), status: 'In procesare' });
  localStorage.setItem('orders', JSON.stringify(orders));

  cart = [];
  updateCart();

  document.getElementById('successOverlay').classList.add('active');
}

fetch('./produse.json').then(r=>r.json()).then(data=>{ products=data; renderOrderItems(); });
updateNavForUser();
</script>
</body>
</html>
